services:
  # ---- PostgreSQL ----
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=varbolao
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=varbolao
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varbolao"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis (FSM de conversas e cache) ----
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Backend (opcional em dev; profile "full") ----
  # Em dev rode `npm run dev` no host em vez de subir aqui.
  # docker compose --profile full up -d → sobe tambem o app container
  app:
    profiles: ["full"]
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://varbolao:${POSTGRES_PASSWORD}@postgres:5432/varbolao
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
