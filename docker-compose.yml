services:
  # ---- PostgreSQL (banco do bot E da Evolution) ----
  postgres:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=varbolao
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DB=varbolao
    volumes:
      - postgres_data:/var/lib/postgresql/data
      # cria tambem o banco "evolution" no primeiro start
      - ./scripts/init-evolution-db.sh:/docker-entrypoint-initdb.d/init-evolution-db.sh:ro
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U varbolao"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Redis (FSM de conversas + Evolution cache) ----
  redis:
    image: redis:7-alpine
    ports:
      - "6380:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  # ---- Evolution API v1.8.7 (WhatsApp via Baileys) ----
  # Downgrade da v2.x. Versoes v2.x tem Baileys com versao do WhatsApp Web
  # hardcoded ja obsoleta, causando loop close/connecting infinito.
  # v1.8.7 foi a ultima estavel da serie v1; comunidade reportou que conecta
  # sem o bug. Config bem diferente da v2 — env vars proprias.
  evolution:
    image: atendai/evolution-api:v1.8.7
    ports:
      - "8080:8080"
    environment:
      - SERVER_TYPE=http
      - SERVER_PORT=8080
      - SERVER_URL=${EVOLUTION_SERVER_URL:-http://localhost:8080}

      # Auth
      - AUTHENTICATION_TYPE=apikey
      - AUTHENTICATION_API_KEY=${EVOLUTION_API_KEY}
      - AUTHENTICATION_EXPOSE_IN_FETCH_INSTANCES=true
      - AUTHENTICATION_JWT_EXPIRIN_IN=0
      - AUTHENTICATION_JWT_SECRET=L=0YWt]b2w[WrFV1XmvKz#)E

      # Persistencia das sessoes em arquivos (volume), sem DB externo
      # (v1.x suporta MongoDB mas eh complicacao desnecessaria pra dev)
      - DATABASE_ENABLED=false
      - STORE_MESSAGES=true
      - STORE_MESSAGE_UP=true
      - STORE_CONTACTS=true
      - STORE_CHATS=true

      # Redis (cache)
      - REDIS_ENABLED=true
      - REDIS_URI=redis://redis:6379
      - REDIS_PREFIX_KEY=evolution

      # Webhook global aponta pro app — o handler do bot decide o que fazer
      - WEBHOOK_GLOBAL_ENABLED=true
      - WEBHOOK_GLOBAL_URL=${WEBHOOK_GLOBAL_URL:-http://host.docker.internal:3000/webhook/whatsapp}
      - WEBHOOK_GLOBAL_WEBHOOK_BY_EVENTS=false
      - WEBHOOK_EVENTS_APPLICATION_STARTUP=false
      - WEBHOOK_EVENTS_QRCODE_UPDATED=true
      - WEBHOOK_EVENTS_MESSAGES_UPSERT=true
      - WEBHOOK_EVENTS_MESSAGES_UPDATE=false
      - WEBHOOK_EVENTS_SEND_MESSAGE=false
      - WEBHOOK_EVENTS_CONTACTS_UPSERT=false
      - WEBHOOK_EVENTS_CONTACTS_UPDATE=false
      - WEBHOOK_EVENTS_PRESENCE_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_UPSERT=false
      - WEBHOOK_EVENTS_CHATS_UPDATE=false
      - WEBHOOK_EVENTS_CHATS_DELETE=false
      - WEBHOOK_EVENTS_GROUPS_UPSERT=false
      - WEBHOOK_EVENTS_GROUPS_UPDATE=false
      - WEBHOOK_EVENTS_GROUP_PARTICIPANTS_UPDATE=false
      - WEBHOOK_EVENTS_CONNECTION_UPDATE=true
      - WEBHOOK_EVENTS_CALL=false
      - WEBHOOK_EVENTS_NEW_JWT_TOKEN=false

      # Config session
      - CONFIG_SESSION_PHONE_CLIENT=VAR_do_Bolao
      - CONFIG_SESSION_PHONE_NAME=Chrome

      # QR code
      - QRCODE_LIMIT=30
      - QRCODE_COLOR=#175197

      # Logs
      - LOG_LEVEL=ERROR,WARN,INFO,LOG
      - LOG_COLOR=true
      - LOG_BAILEYS=error

      # Delete instance auto
      - DEL_INSTANCE=false
    volumes:
      - evolution_instances:/evolution/instances
      - evolution_store:/evolution/store
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped

  # ---- Backend do VAR do Bolao (perfil "full" pra subir junto) ----
  # Em dev rode `npm run dev` no host. Em prod ative com:
  #   docker compose --profile full up -d
  app:
    profiles: ["full"]
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://varbolao:${POSTGRES_PASSWORD}@postgres:5432/varbolao
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_API_URL=http://evolution:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store:
