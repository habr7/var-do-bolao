  # ---- Backend do VAR do Bolao (perfil "full" pra subir junto) ----
  # Em dev rode `npm run dev` no host. Em prod ative com:
  #   docker compose --profile full up -d
  app:
    profiles: ["full"]
    build: .
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_URL=postgresql://varbolao:${POSTGRES_PASSWORD}@postgres:5432/varbolao
      - REDIS_URL=redis://redis:6379/0
      - EVOLUTION_API_URL=http://evolution:8080
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      evolution:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store:
